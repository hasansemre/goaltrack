<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="512" x2="512" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0c0120"/>
      <stop offset="50%" stop-color="#2d0b61"/>
      <stop offset="100%" stop-color="#1c1680"/>
    </linearGradient>
    <radialGradient id="cg" cx="50%" cy="44%" r="54%">
      <stop offset="0%" stop-color="#5b21b6" stop-opacity="0.75"/>
      <stop offset="100%" stop-color="#0c0120" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="rg" x1="177" y1="393" x2="335" y2="90" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#e879f9"/>
      <stop offset="38%" stop-color="#818cf8"/>
      <stop offset="100%" stop-color="#22d3ee"/>
    </linearGradient>
    <filter id="rglow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="14" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="cglow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="9" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="dglow" x="-120%" y="-120%" width="340%" height="340%">
      <feGaussianBlur stdDeviation="10" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>
  <rect width="512" height="512" rx="112" fill="url(#cg)"/>

  <!-- Depth rings -->
  <circle cx="256" cy="256" r="202" fill="none" stroke="white" stroke-width="0.6" stroke-opacity="0.05"/>
  <circle cx="256" cy="256" r="118" fill="none" stroke="white" stroke-width="0.6" stroke-opacity="0.05"/>

  <!-- Ring glow (blur copy) -->
  <path d="M 177 393 A 158 158 0 1 1 335 393"
    fill="none" stroke="url(#rg)" stroke-width="42"
    stroke-linecap="round" opacity="0.28" filter="url(#rglow)"/>

  <!-- Main progress ring (300° arc, gap at bottom) -->
  <path d="M 177 393 A 158 158 0 1 1 335 393"
    fill="none" stroke="url(#rg)" stroke-width="22" stroke-linecap="round"/>

  <!-- Checkmark glow -->
  <path d="M 174 256 L 231 316 L 346 191"
    fill="none" stroke="white" stroke-width="52"
    stroke-linecap="round" stroke-linejoin="round"
    opacity="0.18" filter="url(#cglow)"/>

  <!-- Checkmark -->
  <path d="M 174 256 L 231 316 L 346 191"
    fill="none" stroke="white" stroke-width="34"
    stroke-linecap="round" stroke-linejoin="round" opacity="0.96"/>

  <!-- Start dot (magenta) -->
  <circle cx="177" cy="393" r="17" fill="#e879f9" filter="url(#dglow)" opacity="0.95"/>
  <!-- End dot (cyan) -->
  <circle cx="335" cy="393" r="17" fill="#22d3ee" filter="url(#dglow)" opacity="0.95"/>

  <!-- 4-point sparkle top-right -->
  <g transform="translate(362,117)" opacity="0.82">
    <line x1="0" y1="-13" x2="0" y2="13" stroke="white" stroke-width="2.8" stroke-linecap="round"/>
    <line x1="-13" y1="0" x2="13" y2="0" stroke="white" stroke-width="2.8" stroke-linecap="round"/>
    <line x1="-8" y1="-8" x2="8" y2="8" stroke="white" stroke-width="1.6" stroke-linecap="round" opacity="0.55"/>
    <line x1="8" y1="-8" x2="-8" y2="8" stroke="white" stroke-width="1.6" stroke-linecap="round" opacity="0.55"/>
  </g>

  <!-- Accent dots -->
  <circle cx="392" cy="194" r="3.5" fill="#22d3ee" opacity="0.75"/>
  <circle cx="153" cy="198" r="3" fill="#e879f9" opacity="0.65"/>
</svg>
